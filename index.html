<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TRPG GM DASHBOARD</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="main-layout">
        <aside class="sidebar left-sidebar">
            <h2 class="cinzel">PINNED</h2>
            <div id="pinned-list"></div>
        </aside>

        <main class="content-area">
            <div class="container">
                <header><h1 class="cinzel">CHARACTER ARCHIVE</h1></header>

                <div class="dice-dashboard">
                    <div class="dice-result-box">
                        <span id="dice-display">🎲 판정 준비 완료</span>
                        <button id="output-btn" onclick="confirmSend()" style="display:none;">출력하기</button>
                    </div>
                    <div class="min-value-setting">
                        <span>📉 최소:</span><input type="number" id="min-dice" value="1" min="1">
                        <span>➕ 외부추가:</span><input type="number" id="extra-dice" value="0">
                        <label><input type="checkbox" id="auto-output"> 자동출력</label>
                        <input type="password" id="webhook-url" placeholder="Webhook URL">
                    </div>
                </div>

                <section id="input-section">
                    <div class="input-card">
                        <input type="text" id="char-name" placeholder="캐릭터 이름을 입력하세요...">
                        <div class="stats-grid">
                            <div class="stat-group"><span>체력</span><input type="number" id="hp"></div>
                            <div class="stat-group"><span>스테미나</span><input type="number" id="stamina"></div>
                            <div class="stat-group"><span>힘</span><input type="number" id="str"></div>
                            <div class="stat-group"><span>건강</span><input type="number" id="health"></div>
                            <div class="stat-group"><span>속도</span><input type="number" id="speed"></div>
                            <div class="stat-group"><span>정밀</span><input type="number" id="precision"></div>
                            <div class="stat-group"><span>지능</span><input type="number" id="intel"></div>
                            <div class="stat-group"><span>지혜</span><input type="number" id="wis"></div>
                            <div class="stat-group"><span>매력</span><input type="number" id="cha"></div>
                            <div class="stat-group"><span>데미지</span><input type="number" id="dmg"></div>
                            <div class="stat-group"><span>보조뎀</span><input type="number" id="dmg-sub"></div>
                            <div class="stat-group"><span>방어력</span><input type="number" id="def"></div>
                        </div>
                        <button onclick="saveCharacter()" class="save-btn">캐릭터 기록하기</button>
                        <div class="excel-upload-zone">
                            <p>📊 엑셀 불러오기 (C4/R4~R15)</p>
                            <input type="file" id="excel-file" accept=".xlsx, .xls">
                        </div>
                    </div>
                </section>
                <hr class="divider">
                <div id="character-list"></div>
            </div>
        </main>

        <aside class="sidebar right-sidebar" id="right-sidebar">
            <button class="log-toggle-btn" onclick="toggleLogPanel()">◀</button>

            <div class="log-panel-content">
                <h2 class="cinzel">DICE LOG</h2>
                <div id="dice-log-container"></div>
                <button onclick="clearLog()" class="clear-log-btn">로그 비우기</button>
            </div>
        </aside>
    </div>
    <script src="script.js"></script>
</body>
</html>
